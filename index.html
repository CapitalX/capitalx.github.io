<!DOCTYPE html>
<html>
<head>
    <title>Startup Animation with Navigation</title>
    <style>
        /* CSS styles for the animation */
        body {
            overflow: hidden; /* Hide overflow to prevent scrollbars during animation */
        }
        .startup-animation {
            animation: fadeInPage 2s ease-out forwards; /* Apply the animation to the entire page */
            background-color: #777777;
        }
        @keyframes fadeInPage {
            from {
                opacity: 0; /* Start with opacity 0 */
            }
            to {
                opacity: 1; /* End with opacity 1 */
            }
        }

        /* Animation for the navigation */
        nav {
            animation: fadeInNav 2s ease-out forwards; /* Apply the animation to the navigation */
            background-color: #333;
            padding: 10px;
            opacity: 0; /* Initially hide the navigation */
        }
        @keyframes fadeInNav {
            from {
                opacity: 0; /* Start with opacity 0 */
            }
            to {
                opacity: 1; /* End with opacity 1 */
            }
        }

        /* Additional styles for the navigation */
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        li {
            display: inline-block;
            margin-right: 20px;
        }
        li a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
        }
        li a:hover {
            background-color: #555;
        }
    </style>
</head>
<body class="startup-animation">

<!-- Your navigation bar -->
<nav>
    <ul>
        <li><a href="#about">About Me</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- Your content goes here -->
<h1>Hello World</h1>
<p>I'm hosted with GitHub Pages.</p>

<!-- Additional content... -->

</body>
</html>
