<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <style>
        /* CSS styles for the animation */
        body {
            overflow: hidden; /* Hide overflow to prevent scrollbars during animation */
            background-color: #EAE7DC; /* Set the base background color */
        }
        .startup-animation {
            animation: fadeInPage 2s ease-out forwards; /* Apply the animation to the entire page */
            opacity: 0;
        }
        @keyframes fadeInPage {
            from {
                opacity: 0; /* Start with opacity 0 */
            }
            to {
                opacity: 1; /* End with opacity 1 */
            }
        }

        /* Animation for the navigation */
        nav {
            animation: fadeInNav 2s ease-out forwards; /* Apply the animation to the navigation */
            background-color: #cea264; /* Set the navbar background color */
            padding: 10px;
            opacity: 0; /* Initially hide the navigation */
            border-radius: 15px; /* Round out the corners */
            display: flex;
            justify-content: space-between; /* Align items with space between them */
        }
        @keyframes fadeInNav {
            from {
                opacity: 0; /* Start with opacity 0 */
            }
            to {
                opacity: 1; /* End with opacity 1 */
            }
        }

        /* Additional styles for the navigation */
        .nav-items {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .nav-items .home {
            margin-right: auto; /* Push the home button all the way to the left */
        }
        .nav-items li {
            margin-left: 20px; /* Add some space between items */
        }
        .nav-items li a {
            color: #5c4b18; /* Set the navbar buttons color */
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block; /* Make the links display as blocks */
        }
        .nav-items li a:hover {
            background-color: #5c4d20; /* Set the hover background color */
            color: rgb(240, 180, 140); /* Change text color on hover */
        }

        /* Additional styles for the home icon */
        .home-icon {
            color: #5c4b18; /* Match the color of navbar buttons */
            font-size: 20px; /* Adjust the size of the icon */
            vertical-align: middle; /* Align the icon vertically */
        }
    </style>
</head>
<body class="startup-animation">

<!-- Your navigation bar -->
<nav>
    <ul class="nav-items">
        <li class="home"><a href="#home"><span class="home-icon">🏠</span></a></li>
        <li><a href="#about">About Me</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
    <!-- Empty space -->
    <div></div>
    <!-- Additional links -->
    <a href="#login">Login</a>
    <a href="#signup">Sign Up</a>
</nav>

<!-- Your content goes here -->
<h1>Hello World</h1>
<p>I'm hosted with GitHub Pages.</p>

<!-- Additional content... -->

</body>
</html>
